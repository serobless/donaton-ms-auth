server.port=8083

# ── Base de datos ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/donaton_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ────────────────────────────────────────────────────────────────────────
# Secreto en Base64 (mínimo 256 bits para HS256). Cambia esto en producción.
jwt.secret=ZG9uYXRvbi1tcy1hdXRoLXNlY3JldC1rZXktZHVvY3VjLWRzeTExMDY=
jwt.expiration=86400000

# ── OpenAPI / Swagger ──────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
